<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USPP — Курс посадки (ВПП 03/21)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #0a0e1a;
            color: #e0e6f0;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #7ec8e3;
            font-size: 20px;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            color: #555;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .main-card {
            background: #131929;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            margin: 0 auto 20px;
            text-align: center;
        }
        .runway-label {
            font-size: 13px;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .runway-block { line-height: 1; margin-bottom: 4px; }
        .rwy-tag {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .rwy-num {
            font-size: 130px;
            font-weight: 900;
            line-height: 1;
        }
        .rwy-num.loading { font-size: 28px; color: #555; padding: 30px 0; }
        .rwy-num.error   { font-size: 28px; color: #ef5350; padding: 30px 0; }
        .rwy-num.calm    { font-size: 60px; color: #ffb74d; padding: 10px 0; }
        .rwy-num.vrb     { font-size: 60px; color: #ce93d8; padding: 10px 0; }
        .rwy-tag.rwy21, .rwy-num.rwy21 { color: #4fc3f7; }
        .rwy-tag.rwy03, .rwy-num.rwy03 { color: #81c784; }
        .rwy-tag.calm, .rwy-tag.vrb, .rwy-tag.error, .rwy-tag.loading { color: #555; }
        .heading-sub {
            font-size: 15px;
            color: #aaa;
            margin-bottom: 16px;
            min-height: 22px;
        }
        .wind-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 16px 0;
        }
        .wind-block { text-align: center; min-width: 60px; }
        .wind-value { font-size: 26px; font-weight: bold; color: #fff; }
        .wind-key   { font-size: 11px; color: #555; margin-top: 2px; }
        .compass-wrap {
            margin: 16px auto 0;
            display: flex;
            justify-content: center;
        }
        .metar-box {
            background: #0a0e1a;
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            color: #7ec8e3;
            word-break: break-all;
            margin-top: 14px;
            text-align: left;
            min-height: 36px;
        }
        .updated {
            font-size: 11px;
            color: #444;
            margin-top: 8px;
        }
        .next-update {
            font-size: 12px;
            color: #555;
            margin-top: 4px;
        }
        .history {
            max-width: 500px;
            margin: 0 auto;
        }
        .history h2 {
            color: #888;
            font-size: 13px;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #131929;
            color: #7ec8e3;
            padding: 8px 10px;
            font-size: 12px;
            text-align: center;
        }
        td {
            padding: 7px 10px;
            text-align: center;
            border-bottom: 1px solid #1a2035;
            font-size: 13px;
        }
        tr:nth-child(even) td { background: #0e1422; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
        }
        .badge.rwy21 { background: #0d3a4f; color: #4fc3f7; }
        .badge.rwy03 { background: #1a3a1a; color: #81c784; }
        .badge.calm  { background: #3a2a00; color: #ffb74d; }
        .badge.vrb   { background: #2a1a3a; color: #ce93d8; }
        .legend {
            display: flex;
            gap: 16px;
            justify-content: center;
            font-size: 11px;
            color: #555;
            margin-top: 10px;
        }
        .legend span { display: flex; align-items: center; gap: 5px; }
        .legend-line {
            display: inline-block;
            width: 20px;
            height: 3px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

<h1>✈ Аэропорт Большое Савино — Пермь</h1>
<p class="subtitle">ICAO: USPP · ВПП 03/21 (030°/210°) · Обновление каждую минуту</p>

<div class="main-card">
    <div class="runway-label">Активная ВПП</div>
    <div class="runway-block">
        <div class="rwy-tag loading" id="rwyTag">ВПП</div>
        <div class="rwy-num loading" id="rwyNum">—</div>
    </div>
    <div class="heading-sub" id="headingSub"></div>

    <div class="wind-info">
        <div class="wind-block">
            <div class="wind-value" id="windDir">—</div>
            <div class="wind-key">Откуда (°)</div>
        </div>
        <div class="wind-block">
            <div class="wind-value" id="windSpd">—</div>
            <div class="wind-key">Скорость (уз)</div>
        </div>
        <div class="wind-block">
            <div class="wind-value" id="windGst">—</div>
            <div class="wind-key">Порыв (уз)</div>
        </div>
        <div class="wind-block">
            <div class="wind-value" id="headwind">—</div>
            <div class="wind-key">Встречный (уз)</div>
        </div>
    </div>

    <div class="compass-wrap">
        <svg id="compass" width="160" height="160" viewBox="-80 -80 160 160"></svg>
    </div>

    <div class="legend">
        <span><span class="legend-line" style="background:#4fc3f7"></span>ВПП 21 (210°)</span>
        <span><span class="legend-line" style="background:#81c784"></span>ВПП 03 (030°)</span>
        <span><span class="legend-line" style="background:#ef5350;"></span>Ветер (откуда)</span>
    </div>

    <div class="metar-box" id="metarRaw">—</div>
    <div class="updated" id="updatedTime"></div>
    <div class="next-update" id="nextUpdate"></div>
</div>

<div class="history">
    <h2><span class="dot"></span>История обновлений</h2>
    <table>
        <thead>
            <tr>
                <th>#</th><th>Время</th><th>Посадка</th><th>Взлёт</th><th>Ветер</th><th>Скорость</th>
            </tr>
        </thead>
        <tbody id="histBody"></tbody>
    </table>
</div>

<script>
// Runway definitions for USPP (Bolshoye Savino, Perm)
const RUNWAYS = [
    { name: '03', heading: 30  },
    { name: '21', heading: 210 }
];

let updateCount = 0;
let countdown = 60;
let countdownTimer = null;

function angleDiff(a, b) {
    let d = Math.abs(a - b) % 360;
    return d > 180 ? 360 - d : d;
}

// Preferred runway when calm or variable wind
const PREFERRED_RWY = RUNWAYS.find(r => r.name === '21');

function getActiveRunway(windDir, windSpd, isVariable) {
    // Calm or variable — use preferred runway
    if (isVariable || windSpd === 0 || windDir == null) {
        const rwy = PREFERRED_RWY;
        return {
            name:      'ВПП ' + rwy.name,
            cls:       'rwy' + rwy.name,
            heading:   rwy.heading,
            rwyNum:    rwy.name,
            headwind:  0,
            crosswind: 0,
            isCalm:    true,
            isVrb:     isVariable
        };
    }
    // Pick runway with best headwind component
    let best = null, bestDiff = 999;
    for (const rwy of RUNWAYS) {
        const diff = angleDiff(windDir, rwy.heading);
        if (diff < bestDiff) { bestDiff = diff; best = rwy; }
    }
    const rad = bestDiff * Math.PI / 180;
    return {
        name:      'ВПП ' + best.name,
        cls:       'rwy' + best.name,
        heading:   best.heading,
        rwyNum:    best.name,
        headwind:  Math.round(windSpd * Math.cos(rad)),
        crosswind: Math.round(Math.abs(windSpd * Math.sin(rad))),
        isCalm:    false,
        isVrb:     false
    };
}

function drawCompass(windDir, activeHeading, activeCls) {
    const svg = document.getElementById('compass');
    svg.innerHTML = '';
    const ns = 'http://www.w3.org/2000/svg';

    function el(tag, attrs) {
        const e = document.createElementNS(ns, tag);
        for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
        return e;
    }

    // Outer ring
    svg.appendChild(el('circle', { r: 72, fill: '#0a0e1a', stroke: '#2a3a4a', 'stroke-width': 2 }));
    svg.appendChild(el('circle', { r: 56, fill: 'none', stroke: '#1a2535', 'stroke-width': 1 }));

    // Degree ticks (every 30°)
    for (let deg = 0; deg < 360; deg += 30) {
        const rad = (deg - 90) * Math.PI / 180;
        const r1 = 62, r2 = 70;
        svg.appendChild(el('line', {
            x1: Math.cos(rad) * r1, y1: Math.sin(rad) * r1,
            x2: Math.cos(rad) * r2, y2: Math.sin(rad) * r2,
            stroke: '#2a3a4a', 'stroke-width': 1
        }));
    }

    // Cardinal labels
    [['С', 0], ['В', 90], ['Ю', 180], ['З', 270]].forEach(([label, deg]) => {
        const rad = (deg - 90) * Math.PI / 180;
        const t = el('text', {
            x: Math.cos(rad) * 48, y: Math.sin(rad) * 48 + 4,
            'text-anchor': 'middle', fill: '#445', 'font-size': 11
        });
        t.textContent = label;
        svg.appendChild(t);
    });

    // Runway line (03/21 = 030°/210°)
    const rwyRad03 = (30 - 90) * Math.PI / 180;  // heading 030°
    const rwyRad21 = (210 - 90) * Math.PI / 180; // heading 210°
    svg.appendChild(el('line', {
        x1: Math.cos(rwyRad03) * 52, y1: Math.sin(rwyRad03) * 52,
        x2: Math.cos(rwyRad21) * 52, y2: Math.sin(rwyRad21) * 52,
        stroke: '#1e3a1e', 'stroke-width': 8, 'stroke-linecap': 'round'
    }));
    // Runway labels
    [['03', rwyRad03, '#81c784'], ['21', rwyRad21, '#4fc3f7']].forEach(([name, rad, color]) => {
        const t = el('text', {
            x: Math.cos(rad) * 58, y: Math.sin(rad) * 58 + 4,
            'text-anchor': 'middle', fill: color,
            'font-size': 9, 'font-weight': 'bold'
        });
        t.textContent = name;
        svg.appendChild(t);
    });

    // Active runway arrow
    if (activeHeading !== null) {
        const rad = (activeHeading - 90) * Math.PI / 180;
        const color = activeCls === 'rwy21' ? '#4fc3f7' : '#81c784';
        const ax = Math.cos(rad) * 44, ay = Math.sin(rad) * 44;
        svg.appendChild(el('line', {
            x1: -ax * 0.7, y1: -ay * 0.7,
            x2: ax, y2: ay,
            stroke: color, 'stroke-width': 3, 'stroke-linecap': 'round'
        }));
        // Arrowhead
        const hw = 9;
        const p = `${ax},${ay} ${ax - Math.cos(rad - 0.4) * hw},${ay - Math.sin(rad - 0.4) * hw} ${ax - Math.cos(rad + 0.4) * hw},${ay - Math.sin(rad + 0.4) * hw}`;
        svg.appendChild(el('polygon', { points: p, fill: color }));
    }

    // Wind direction arrow (dashed red) — FROM this direction
    if (windDir != null && windDir > 0) {
        const wRad = (windDir - 90) * Math.PI / 180;
        // Arrow comes FROM windDir toward center
        const wx = Math.cos(wRad) * 46, wy = Math.sin(wRad) * 46;
        svg.appendChild(el('line', {
            x1: wx, y1: wy, x2: wx * 0.15, y2: wy * 0.15,
            stroke: '#ef5350', 'stroke-width': 2, 'stroke-dasharray': '4,3'
        }));
        // Arrowhead near center
        const endX = wx * 0.15, endY = wy * 0.15;
        const rad2 = Math.atan2(endY - wy, endX - wx);
        const hw2 = 8;
        const p2 = `${endX},${endY} ${endX - Math.cos(rad2 - 0.4) * hw2},${endY - Math.sin(rad2 - 0.4) * hw2} ${endX - Math.cos(rad2 + 0.4) * hw2},${endY - Math.sin(rad2 + 0.4) * hw2}`;
        svg.appendChild(el('polygon', { points: p2, fill: '#ef5350' }));
        // Wind origin dot
        svg.appendChild(el('circle', { cx: wx, cy: wy, r: 3, fill: '#ef5350' }));
    }

    // Center dot
    svg.appendChild(el('circle', { r: 4, fill: '#fff' }));
}

async function fetchMETAR() {
    const url = '/api/metar?ids=USPP&format=json';
    try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (!data || data.length === 0) throw new Error('METAR не получен');

        const m = data[0];
        const rawOb = m.rawOb || '—';
        const isVariable = rawOb.includes(' VRB');
        const windDir  = isVariable ? null : (m.wdir ?? null);
        const windSpd  = m.wspd ?? 0;
        const windGst  = m.wgst ?? null;

        const active = getActiveRunway(windDir, windSpd, isVariable);

        // Update display
        const rwyTag = document.getElementById('rwyTag');
        const rwyNum = document.getElementById('rwyNum');
        rwyTag.textContent = 'ВПП';
        rwyTag.className = 'rwy-tag ' + active.cls;
        rwyNum.textContent = active.rwyNum;
        rwyNum.className = 'rwy-num ' + active.cls;

        if (active.isCalm && active.isVrb) {
            document.getElementById('headingSub').textContent =
                `Курс ${active.heading}° · Переменный ветер — предпочтительная полоса`;
        } else if (active.isCalm) {
            document.getElementById('headingSub').textContent =
                `Курс ${active.heading}° · Штиль — предпочтительная полоса`;
        } else {
            document.getElementById('headingSub').textContent =
                `Курс посадки ${active.heading}° · Боковой ветер ${active.crosswind} уз`;
        }

        document.getElementById('windDir').textContent =
            isVariable ? 'VRB' : (windSpd === 0 ? 'Штиль' : (windDir + '°'));
        document.getElementById('windSpd').textContent = windSpd + ' уз';
        document.getElementById('windGst').textContent = windGst ? windGst + ' уз' : '—';
        document.getElementById('headwind').textContent = active.headwind ? active.headwind + ' уз' : '—';
        document.getElementById('metarRaw').textContent = rawOb;

        const now = new Date();
        document.getElementById('updatedTime').textContent =
            'Обновлено: ' + now.toLocaleTimeString('ru-RU') +
            (m.reportTime ? ' · METAR от: ' + m.reportTime : '');

        drawCompass(windDir, active.heading, active.cls);
        addHistory(active, windDir, windSpd, isVariable);

    } catch (e) {
        document.getElementById('rwyTag').className = 'rwy-tag error';
        document.getElementById('rwyNum').textContent = 'ERR';
        document.getElementById('rwyNum').className = 'rwy-num error';
        document.getElementById('headingSub').textContent = '';
        document.getElementById('metarRaw').textContent = 'Ошибка: ' + e.message;
        drawCompass(null, null, null);
    }
}

function addHistory(active, windDir, windSpd, isVariable) {
    updateCount++;
    const tbody = document.getElementById('histBody');
    const now = new Date().toLocaleTimeString('ru-RU');
    const windStr = isVariable ? 'VRB' : (windSpd === 0 ? 'Штиль' : windDir + '°');
    const spdStr  = windSpd + ' уз';
    const rwyBadge = `<span class="badge ${active.cls}">${active.name}</span>`;
    const row = document.createElement('tr');
    row.innerHTML = `
        <td>${updateCount}</td>
        <td>${now}</td>
        <td>${rwyBadge}</td>
        <td>${rwyBadge}</td>
        <td>${windStr}</td>
        <td>${spdStr}</td>
    `;
    tbody.insertBefore(row, tbody.firstChild);
    while (tbody.rows.length > 30) tbody.deleteRow(tbody.rows.length - 1);
}

function startCountdown() {
    clearInterval(countdownTimer);
    countdown = 60;
    countdownTimer = setInterval(() => {
        countdown--;
        document.getElementById('nextUpdate').textContent =
            'Следующее обновление через ' + Math.max(0, countdown) + ' сек';
    }, 1000);
}

// Start
fetchMETAR();
startCountdown();
setInterval(() => { fetchMETAR(); startCountdown(); }, 60000);
</script>
</body>
</html>
